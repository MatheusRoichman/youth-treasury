name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint, Types & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npx biome check .

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
